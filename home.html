<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B13-A05-Saddam</title>
    <!-- tailwind and daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- css file connect -->
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body class="bg-[#F8FAFC]">
    <!-- header section -->
    <header class="w-11/12 mx-auto">
      <div class="navbar bg-base-100 shadow-sm">
        <div class="flex justify-start items-center flex-1">
          <img class="w-15" src="./assets/github-logo.png" alt="" />
          <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2">
          <input
            oninput="searchDataFetch()"
            id="search"
            type="text"
            placeholder="Search"
            class="input input-bordered w-24 md:w-auto"
          />
          <div class="dropdown dropdown-end">
            <button class="btn btn-primary">
              <span>+</span>
              <span>New Issue</span>
            </button>
          </div>
        </div>
      </div>
    </header>
    <main class="w-10/12 mx-auto">
      <!-- All, Open, Closed button -->
      <section id="all-btn" class="mt-20 py-10 px-10 bg-white shadow-md">
        <button
          id="all-button"
          onclick="showOnly('all-card', 'all-count-display')"
          class="btn px-13 btn-primary"
        >
          All
        </button>
        <button
          id="open-button"
          onclick="showOnly('open-card', 'open-count-display')"
          class="btn px-13 btn-base-100"
        >
          Open
        </button>
        <button
          id="closed-button"
          onclick="showOnly('closed-card', 'closed-count-display')"
          class="btn px-13"
        >
          Closed
        </button>
      </section>

      <!-- issue Count section -->
      <section
        id="issue-count"
        class="mt-7 py-10 px-10 bg-white shadow-md flex justify-between items-center"
      >
        <div class="count-left flex items-center gap-2">
          <img src="./assets/Aperture.png" alt="" />
          <div>
            <h2 id="all-count-display" class="text-xl font-bold">
              <span id="all-count">50</span> Issues
            </h2>
            <h2 id="open-count-display" class="text-xl font-bold hidden">
              <span id="open-count">0</span> Issues
            </h2>
            <h2 id="closed-count-display" class="text-xl font-bold hidden">
              <span id="closed-count">0</span> Issues
            </h2>
            <p>Track and manage your project issues</p>
          </div>
        </div>
        <div class="count-right">
          <span><i id="fa-1" class="fa-solid fa-circle"></i> Open</span>
          <span><i id="fa-2" class="fa-solid fa-circle"></i> Closed</span>
        </div>
      </section>
      <!-- all card display -->
      <section
        id="all-card"
        class="mt-7 py-10 px-10 shadow-md grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3"
      ></section>
      <!-- open card display -->
      <section
        id="open-card"
        class="mt-7 py-10 px-10 shadow-md grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 hidden"
      ></section>
      <!-- closed card display -->
      <section
        id="closed-card"
        class="mt-7 py-10 px-10 shadow-md grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 hidden"
      ></section>

      <!-- Open the modal using ID.showModal() method -->
      <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->

      <dialog id="word_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
          <div id="details-container" class="space-y-5"></div>
          <div class="modal-action">
            <form method="dialog">
              <!-- if there is a button in form, it will close the modal -->
              <button class="btn">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </main>
    <script src="./script/home.js"></script>
    <script src="./script/helpers.js"></script>
  </body>
</html>
