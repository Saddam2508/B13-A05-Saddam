<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B13-A05-Saddam</title>
    <!-- tailwind and daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- css file connect -->
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <section id="login">
      <div class="min-h-screen max-w-md mx-auto bg-base-200">
        <div class="logo w-[400px] pt-9 mx-auto text-center space-y-2">
          <img class="mx-auto" src="./assets/github-logo.png" alt="" />
          <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
          <p class="text-gray-500">Sign in to manage your issues</p>
        </div>
        <div class="form mt-8">
          <div
            class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl mx-auto"
          >
            <div class="card-body">
              <fieldset class="fieldset">
                <label class="label text-neutral font-bold">Username</label>
                <input
                  type="text"
                  id="user-name"
                  minlength="5"
                  maxlength="5"
                  value="admin"
                  class="input rounded-full bg-base-200"
                  placeholder="Enter Username"
                />
                <label class="label text-neutral font-bold">Password</label>
                <input
                  type="password"
                  id="password"
                  minlength="8"
                  maxlength="8"
                  class="input rounded-full bg-base-200"
                  placeholder="Enter Password"
                />
                <button
                  id="login-btn"
                  class="btn btn-neutral mt-4 bg-primary rounded-full"
                >
                  Sign In
                </button>
              </fieldset>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="./script/login.js"></script>
    <script src="./script/helpers.js"></script>
  </body>
</html>
